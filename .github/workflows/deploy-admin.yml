name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: cd admin && npm ci

      - name: Generate Prisma Client
        run: cd admin && npx prisma generate

      - name: Build
        run: cd admin && npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp -r admin/.next/standalone/. deploy/
          cp -r admin/.next/static deploy/admin/.next/static
          cp -r admin/prisma deploy/admin/prisma
          tar czf admin-deploy.tar.gz -C deploy .

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "admin-deploy.tar.gz"
          target: "/var/www"

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH="/usr/local/bin:$PATH"
            pm2 stop selam-admin 2>/dev/null || true
            # Preserve uploads across deployments
            mkdir -p /var/www/selam-admin/uploads
            rm -rf /var/www/selam-admin/app
            mkdir -p /var/www/selam-admin/app
            cd /var/www/selam-admin/app
            tar xzf /var/www/admin-deploy.tar.gz
            rm /var/www/admin-deploy.tar.gz
            cd admin
            cp /var/www/selam-admin/.env .
            # Symlink persistent uploads dir into app
            ln -sf /var/www/selam-admin/uploads uploads
            npm install @prisma/adapter-pg pg @prisma/client bcryptjs dotenv sharp 2>/dev/null
            npx prisma generate 2>/dev/null
            npx prisma db push --skip-generate 2>/dev/null || true
            pm2 delete selam-admin 2>/dev/null || true
            PORT=3001 pm2 start server.js --name selam-admin
            pm2 save
