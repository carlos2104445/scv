name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: cd admin && npm ci

      - name: Generate Prisma Client
        run: cd admin && npx prisma generate

      - name: Build
        run: cd admin && npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "admin/.next/standalone/,admin/.next/static/,admin/prisma/,admin/package.json,admin/nginx/"
          target: "/var/www/selam-admin"
          strip_components: 1
          overwrite: true

      - name: Setup and restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/selam-admin
            
            # Copy static files into standalone
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/
            
            # Copy prisma schema for migrations
            mkdir -p .next/standalone/prisma
            cp -r prisma/* .next/standalone/prisma/
            
            # Install production deps in standalone
            cd .next/standalone
            npm install @prisma/client prisma dotenv --save 2>/dev/null || true
            npx prisma generate 2>/dev/null || true
            
            # Copy env file
            cp /var/www/selam-admin/.env .env 2>/dev/null || true
            
            # Restart with PM2
            pm2 restart selam-admin 2>/dev/null || pm2 start server.js --name selam-admin -- -p 3001
            pm2 save
