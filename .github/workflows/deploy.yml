name: Deploy Frontend to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'admin/**'
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy archive
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public 2>/dev/null || true
          tar czf frontend-deploy.tar.gz -C deploy .

      - name: Upload archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend-deploy.tar.gz"
          target: "/var/www"

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH="/usr/local/bin:$PATH"
            pm2 stop selam-frontend 2>/dev/null || true
            rm -rf /var/www/selam-frontend
            mkdir -p /var/www/selam-frontend
            cd /var/www/selam-frontend
            tar xzf /var/www/frontend-deploy.tar.gz
            rm /var/www/frontend-deploy.tar.gz
            pm2 delete selam-frontend 2>/dev/null || true
            PORT=3000 pm2 start server.js --name selam-frontend
            pm2 save
